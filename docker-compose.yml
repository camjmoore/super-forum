services:
  postgres:
    image: postgres:16-alpine
    container_name: super-forum-postgres
    environment:
      POSTGRES_USER: ${PG_ACCOUNT:-forum_user}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-forum_password}
      POSTGRES_DB: ${PG_DATABASE:-super_duper_forum}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_ACCOUNT:-forum_user} -d ${PG_DATABASE:-super_duper_forum}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - super-forum-network

  redis:
    image: redis:7-alpine
    container_name: super-forum-redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - super-forum-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: super-forum-server
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-4000}
      PG_HOST: postgres
      PG_PORT: 5432
      PG_ACCOUNT: ${PG_ACCOUNT:-forum_user}
      PG_PASSWORD: ${PG_PASSWORD:-forum_password}
      PG_DATABASE: ${PG_DATABASE:-super_duper_forum}
      PG_SYNCHRONIZE: ${PG_SYNCHRONIZE:-true}
      PG_LOGGING: ${PG_LOGGING:-true}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      COOKIE_NAME: ${COOKIE_NAME:-SESSIONID}
      SESSION_SECRET: ${SESSION_SECRET:-dev_secret_key_change_in_production}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "${PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src
      - ./schema.graphql:/schema.graphql
      - ./server/node_modules:/app/node_modules
    networks:
      - super-forum-network

volumes:
  postgres_data:
  redis_data:

networks:
  super-forum-network:
    driver: bridge
